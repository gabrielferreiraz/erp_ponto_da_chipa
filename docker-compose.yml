version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    env_file:
      - .env.local
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pontodachipa-network

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: db-pontodachipa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secret_change_me
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - pontodachipa-network

volumes:
  postgres_data:
    driver: local

networks:
  pontodachipa-network:
    driver: bridge
